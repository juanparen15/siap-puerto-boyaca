# Apache vhost para SIAP — Alumbrado Público de Puerto Boyacá
# Ubicar en: /etc/apache2/sites-available/siap.conf
#
# 1) Asegúrate de que Apache escuche el puerto 8006 (en /etc/apache2/ports.conf añade:  Listen 8006 )
# 2) sudo a2ensite siap && sudo a2enmod rewrite && sudo systemctl reload apache2

<VirtualHost *:8006>
    ServerName siap.ticsistemas.com.co

    DocumentRoot /var/www/html/siap-puerto-boyaca/public

    <Directory /var/www/html/siap-puerto-boyaca/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Cloudflare Tunnel entrega el tráfico por HTTP a este puerto; el HTTPS lo
    # termina Cloudflare. TrustProxies (bootstrap/app.php) usa estos encabezados.
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ErrorLog  ${APACHE_LOG_DIR}/siap_error.log
    CustomLog ${APACHE_LOG_DIR}/siap_access.log combined
</VirtualHost>
