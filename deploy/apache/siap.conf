<VirtualHost *:8006>
      ServerName siap.ticsistemas.com.co
      ServerAlias 192.168.93.19

      DocumentRoot /var/www/html/siap-puerto-boyaca/public

      <Directory /var/www/html/siap-puerto-boyaca/public>
          AllowOverride All
          Options Indexes FollowSymLinks
          Require all granted
      </Directory>

      # Cloudflare termina el HTTPS y entrega por HTTP a este puerto
      SetEnvIf X-Forwarded-Proto "https" HTTPS=on

      ErrorLog ${APACHE_LOG_DIR}/siap-error.log
      CustomLog ${APACHE_LOG_DIR}/siap-access.log combined
</VirtualHost>
